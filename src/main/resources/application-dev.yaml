spring:
  # Database connection
  datasource:
    url: jdbc:oracle:thin:@//192.168.0.107:1521/librarypdb
    username: lms
    password: lms
    driver-class-name: oracle.jdbc.OracleDriver

  # JPA related configurations
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true

jwt:
  signing-key: verySecretKeyForJwtSigningExample123456789verySecretKeyForJwtSigningExample123456789
  expiration: 15m
  refresh-expiration: 7d

# Logging Configuration
logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE