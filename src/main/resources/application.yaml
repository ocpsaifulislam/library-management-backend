spring:
  application:
    name: library-management

  profiles:
    active: dev

  mvc:
    problemdetails:
      enabled: true

server:
  port: 9990
  shutdown: graceful

spring.lifecycle:
  timeout-per-shutdown-phase: 30s

app:
  company-name: Shoaib Suad Technology
  version: 1.0.0
  support-email: support.shoaibsuad@gmail.com
  cors:
    allowed-origins:
      - http://localhost:9991
      - http://localhost:4200
      -
springdoc:
  api-docs: { enabled: true }
  swagger-ui: { enabled: true }

logging:
  level:
    root: INFO
    org.springframework: INFO